services:
  db:
    image: postgres:16 # hivatalos PostgreSQL image letöltése
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: weather # automatikusan létrehozza ezt az adatbázist
    ports:
      - "5432:5432" # host:container – a gépedről elérhető
    volumes:
      - postgres_data:/var/lib/postgresql/data # az adatok megmaradnak container újraindítás után
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"] # megvárja amíg a postgres ténylegesen készen áll
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: . # a Dockerfile alapján buildelés
    ports:
      - "8000:8000"
    env_file:
      - .env.docker # beolvassa a környezeti változókat
    depends_on:
      db:
        condition: service_healthy # csak akkor indul ha a db healthcheck-je sikeres

volumes:
  postgres_data:
